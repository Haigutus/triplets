[project]
name = "triplets"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0",
    "lxml>=4.9",
    "aniso8601",
]

[project.optional-dependencies]
arrow = [
    "pyarrow>=14.0",
]
polars = [
    "polars>=1.0",
    "pyarrow>=14.0",
]
dev = [
    "pytest>=7.0",
    "pytest-xdist",
    "polars>=1.0",
    "pyarrow>=14.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "performance: marks performance tests (run with '-m performance')",
    "requires_perf_backend: needs the compiled cython_pugixml extension",
]

[tool.uv]
exclude-newer = "P14D"

[build-system]
requires = ["setuptools>=61", "wheel", "versioneer", "Cython>=3; platform_system != 'Emscripten'"]
build-backend = "setuptools.build_meta"

[tool.uv.extra-build-dependencies]
triplets = ["versioneer", "setuptools"]

# Note: the cython_pugixml perf backend is built via pixi (pixi.toml) or
# python setup_cython_parser.py build_ext --inplace (not via pip wheel by default yet).
