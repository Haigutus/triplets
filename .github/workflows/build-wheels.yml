name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger

jobs:
  # Pure-python sdist (always works, no cython extension)
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Wheels with compiled cython_pugixml_arrow extension
  wheels:
    name: Build wheel ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            cibw_archs: x86_64
          # Linux aarch64 (ARM)
          - os: ubuntu-latest
            arch: aarch64
            cibw_archs: aarch64
          # macOS x86_64
          - os: macos-13
            arch: x86_64
            cibw_archs: x86_64
          # macOS ARM (Apple Silicon)
          - os: macos-14
            arch: arm64
            cibw_archs: arm64
          # Windows x86_64
          - os: windows-latest
            arch: AMD64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # QEMU for cross-compiling Linux aarch64 on x86_64 runner
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          # Build for CPython 3.10-3.13
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "*-musllinux_*"

          # Build dependencies (installed in the build container)
          CIBW_BUILD_REQUIRES: "cython>=3.0 setuptools>=61 numpy pyarrow>=14.0"

          # Build the cython extension
          CIBW_BEFORE_BUILD: "python setup_cython_parser.py build_ext --inplace"

          # Test the built wheel
          CIBW_TEST_REQUIRES: "pytest pyarrow>=14.0"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_parser_backends.py -q --tb=short -k 'not realgrid'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # Publish to PyPI on tag push
  publish:
    name: Publish to PyPI
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
