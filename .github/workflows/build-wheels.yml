name: Build and publish wheels

# Matches existing release pattern:
#   RC:      tag 0.1.0rc1 -> publish to PyPI, install with: pip install --pre triplets
#   Release: tag 0.1.0    -> publish to PyPI, install with: pip install triplets
on:
  release:
    types: [created]      # same trigger as existing python-publish.yml
  pull_request:           # build on PR to catch build failures (no publish)
  workflow_dispatch:      # manual trigger (no publish)

concurrency:
  group: wheels-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-python sdist (always works, no cython extension)
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  # Wheels with compiled cython_pugixml_arrow extension
  wheels:
    name: Build wheel ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cibw_archs: x86_64
          - os: ubuntu-latest
            arch: aarch64
            cibw_archs: aarch64
          - os: macos-13
            arch: x86_64
            cibw_archs: x86_64
          - os: macos-14
            arch: arm64
            cibw_archs: arm64
          - os: windows-latest
            arch: AMD64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "*-musllinux_*"
          # Skip wheel repair — arrow shared libs are provided by pyarrow at runtime
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
          CIBW_TEST_REQUIRES: "pytest pyarrow>=14.0"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_parser_backends.py -q --tb=short -k \"not realgrid\""

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  # Publish to PyPI on GitHub Release (both RC and final)
  # RC tags like 0.1.0rc1 are published as pre-releases on PyPI
  # Final tags like 0.1.0 are published as stable releases
  publish:
    name: Publish to PyPI
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
